name: ai_newspaper
description: AI Personal Newspaper App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  url_launcher: ^6.2.6

  # Networking
  http: ^1.2.0
  webfeed_revised: ^0.9.0

  # Storage
  shared_preferences: ^2.2.2

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true